# contrail-e2e: Contrail + atproto-devnet for local testing.
#
# Brings up a full local ATProto network (PDS, PLC, Jetstream, TAP) alongside
# the PostgreSQL instance Contrail indexes into. No traffic leaves your laptop.
#
# Prerequisites:
#   - atproto-devnet cloned as a sibling of this contrail repo:
#       some-workspace/
#       ├── contrail/            (this repo)
#       └── atproto-devnet/
#   - Copy .env.example to .env first (scripts/up.sh does this automatically)
#
# Usage:
#   pnpm up     # bring everything up, wait for health
#   pnpm down   # stop + wipe volumes (clean slate)
#   pnpm smoke  # verify services are healthy

include:
  - path: ../../../atproto-devnet/docker-compose.yml

services:
  # PostgreSQL — shared by PLC (devnet) and Contrail (this example).
  # NOTE: included services like PLC can't be modified via `include:` merge,
  # so scripts/up.sh brings postgres up first, then the rest.
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DEVNET_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DEVNET_DB_PASSWORD:-postgres}
    ports:
      - "${PG_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
    networks:
      - atproto-devnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DEVNET_DB_USER:-postgres}"]
      interval: 3s
      timeout: 3s
      retries: 20

  # Maildev — catches PDS email verification messages
  maildev:
    image: maildev/maildev:latest
    restart: unless-stopped
    ports:
      - "${MAILDEV_WEB_PORT:-1080}:1080"
      - "${MAILDEV_SMTP_PORT:-1025}:1025"
    networks:
      - atproto-devnet

volumes:
  pgdata:
